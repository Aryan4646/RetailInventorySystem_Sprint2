<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retail Inventory System</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="#">Retail Inventory System</a>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row mb-4">
            <div class="col">
                <button class="btn btn-primary me-2" onclick="showDashboard()">Dashboard</button>
                <button class="btn btn-success me-2" onclick="showCreateOrder()">Create Order</button>
                <button class="btn btn-secondary me-2" onclick="showCustomerOrders()">Customer Orders</button>
                <button class="btn btn-warning me-2" onclick="showInventory()">Manage Inventory</button>
                <button class="btn btn-info me-2" onclick="showProducts()">Product List</button>
                <button class="btn btn-dark" onclick="showReports()">Reports</button>
            </div>
        </div>

        <div id="messageBox"></div>
        <div id="content"></div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
